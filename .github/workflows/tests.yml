name: Run Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pandas matplotlib

      - name: Run tests
        run: |
          python -m unittest discover -s tests -v 2>&1 | tee test_output.txt
          echo ""
          echo "===== Test Summary ====="
          grep -E "^Ran [0-9]+ test" test_output.txt
          grep -E "^(OK|FAILED)" test_output.txt
